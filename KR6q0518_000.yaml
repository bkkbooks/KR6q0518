body:
  text: 華巖還初佛禪師語録目次敘卷上上堂小參茶話卷下機緣入室拈古頌古雜偈佛事敘我宗無語句亦無一法興人何假于語言文句哉從上諸祖出世教人提持正眼扶豎綱宗末學初機朝參暮請不得已而漏逗一言半句曲為今時日久歲深遂爾葛藤遍地然而咸有於語言下知歸者故語之不可不録也還初法兄幼未業儒不識文字戒得雲峰禪參昭覺末到華巖始與本師針芥相投水乳相合遂首衆服勤一十五載了無異志焉甲子歲值本師有剃師禮塔之行命代主華嚴法席渝城鎮府王公遣官馳供請就院開爐卻之不得乃從焉蓋其開口不涉文字單提向上正眼示人的的自胸襟中貼體流出所以無雕奇鑒妙之句純是一味老實頭禪衆中有感慕者從傍竊記之久而盈帙故有上堂小參雜録咸末學初機朝參暮請契會知歸語句是語之不可不録者時康熙乙丑年余月價南慧仙題于多子山之慈雲禪院
