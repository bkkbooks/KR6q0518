是家山個牯牛貫鼻烈性威獰不可鞭時時密護飽隨眠索頭順便攜存手覿面相逢驀鼻穿調馴清水塘邊與衆群渾忘歲月絶功勳輕蹄不踐人苗稼隨分耕犁不憚勤歸家橫吹竹笛落梅花得意童兒喜氣奢索自纏頭不用撥斜跨牛背直歸家存人梧桐葉落盡皆秋露白草枯不飲牛繩索犁耙通解釋空留狼籍在閻浮雙忘雙放雙收兩俱忘空拳赤手了無長簷前月露虛空面照一竹爐柏子香還原堪笑從前捕跡忙尋枝摘葉總皆狂婆婆原是小姑做虛費草鞋覓短長垂手冤家相對莫輕言七尺烏藤劈面還只教冰消瓦解也自無一物在人間四威儀山中行舉步上崢嶸揚眉方四顧山河一掌平山中住微把家私露提起一柄鋤鏟開往來路山中坐光陰休虛過只教蒲團穿疑情都決破山中臥石枕頭一個睡到日頭紅起來枕子墮十無無孔笛兒日詠玄歌萬象點首石人呵呵無絃一琴鬼神也欽調無生曲使悟玄音無底鉢盂全然不漏貯乾屎橛不香不臭無底個船日臥清淵衆生滿載直達岸邊無底藍兒破之不堪山川俱載世界總函無孔鐵錘也甚奇怪經過幾番通紅爐鞴無星稱子沒權沒衡更沒毫索正合天平無鬚鎖鑰忌兩頭搖中間莫泄直向頂超無縫塔中全不通風下既無底上亦無窮無根樹子忽露些些枯枝老幹普覆天涯總偈十無方不方兮圓不圓無形示現也周全銀山鐵壁人難近萬別千差總是權達磨讚者箇黑漢逞甚能幹不住西乾逍遙震旦罕遇知音假蘆渡岸如斯拖泥帶水也是一場扯淡觀音讚坐寶蓮花無不示現百種千般浮於水面普濟貧窮令人愛戀見者聞者滅惡遷善梵音潮音古今不變雙桂師翁忌辰師詣幀前拈香云堆堆疊疊何時復祖道寥寥去甚遙雙桂忌辰無別供黃檀柏子一爐燒轉身便拜師詣真前云道及師翁忌辰誰知葉落歸根空留虛名狼籍惑亂世人眼睛一年一度拈香祝惱怒阿家恨轉深顧左右云且道是甚麼意祖禰未了殃及兒孫次韻和尚石今古長存羅漢僧口唇未動了殘經雷轟電掃全無畏雨打風吹總不瞋確守寒巖消歲月堅披雲霧作衣衾奇哉怪石天生就一任稱呼是甚人次韻初生筍養就衝天志時來處處通虎衣隨體著金甲褁中空鳳尾連霄漢風影活蛇龍奇哉初生筍相似塔千重與樞機實省禪人勘得二郎關子破天王何處去安身棒頭一擊無思算舉似諸方立主賓與西臨通量禪人因緣大事雖無說拄杖點頭怎放過珍重闍黎勿放逸力行斯道驗禪和與心傳正印禪人觀汝能操向上志將來有益法門焉吾今苦口重相囑鐵橛子兮勿變遷與實慧明定禪人參師學道莫辭勞囑汝江南尚志操踏破草鞋休歇處方知酬價步登高示可立正心禪人佛法南方浩浩地惟吾此處總皆無親拈一柄龜毛原書闕攛下火炬陶美請師為亡母坤鏡起龕四大相聚動作施為四大分散不見其形且道亡僧坤鏡甚處去也顧左右云拂物之時全體現歸家葉落響空聲舉火正好念佛修行誰知太速貪程而今山窮水盡火裏點鐵成金智明請為亡師上生起龕生從何來死從何去以竹篦子擊亡僧云若向者裏薦得亦任去來不消更為饒舌其或未然且到火場中再與重說舉火諸佛歡喜日衆僧自恣時恰是好時節逍遙極樂基無來亦無去蓮花九品堆雖然如是直須是向火裏翻身過始得喝一喝攛下火炬為光明起龕光明光明暗裏知音相依拄杖捨杖便行且道即今是行是住師以竹篦敲亡僧云到那裏與你通信舉火以火炬打圓相云者個皮袋終歸敗壞且道還有不壞者麼喝一喝云吾今助汝丙丁速證無生三昧臘八送衆骨入塔至塔云窣堵波打團圞多寶佛塔湧其前莫道多寶無縫罅年年此日開品蓮一切聖賢如電急青山緑水不變遷衆靈箇箇從今入是誰在後是誰先乃以竹篦召傍僧將靈骨一齊入塔佛誕日送衆靈骨入塔師詣塔云諸佛護生日衆僧白足時果然恰好時節證入無生相宜無生既是相宜且道向甚麼處證入以竹篦打圓相云千葉蓮花上千子一胞胎便入為自明起龕行則同行坐則同坐昨日𧂭殃今朝行腳東去西來不離者個以竹篦打圓相云既有者箇還須說破擊亡僧三下便行舉火連日陰雨此時爽晴自明撒手果甚精靈不是今生辦就莫非屢劫修因喝一喝云從斯脫下娘生褲須向紅爐解轉身咽江請為師大興起龕師云生從何來死從何去眼裏放光鼻頭出氣一息不來靈歸何地拈竹篦向亡僧面門畫一畫引龕便行舉火者箇皮袋兩彩一賽住隨動轉運奔自在山僧助汝一把火免教缺下娘生債為非見起龕非見非見磨苦久戀今朝頓盡略較一線要得端的火場裏面舉火奇哉怪哉奇怪何來三日兩人令我心哀默默無言語相餞一堆柴為廣耀起龕正好過歲瀟灑誰知撒手行忙塵勞一時頓盡必定直往西方臭布衫子拋下送汝再煉火場舉火生來在東土去則往西方知他端的處火內得清涼咄便火送靈骨入塔無縫塔子影團圞不消借樣也周全大興自明從此入平分涌出一枝蓮將竹篦召傍僧投靈骨入光祥等請為亡師起龕師云大哉祗慧精靈不昧撒手懸岩如履平地亦任攸遊去來缺少末後之句且作麼生以拄杖擊一擊便行舉火頂門具眼通天有路四大本空了無一物火來逼身作麼回護莫問院主墮眉鬚看取丹霞燒木佛示衆大道從來不遠方長連床上看心腔一朝打破泥團子瓦塊石頭盡放光無我雲慧請小參師云禪道佛法在老僧拄杖頭上默示神通遂卓一卓云見麼東方入定南方起南方入定西方起西方入定北方起北方入定中央起眼根入定耳根起耳根入定鼻根起鼻根入定舌根起舌根入定身根起身根入定意根起如斯八萬四千毫毛孔竅俱是神通只如四大本空五蘊非有拄杖子神通在甚麼處復卓一卓喝一喝云毗婆尸佛早留心直至而今不得妙一僧舉世尊因緣問師雲門打煞丹霞火化意旨如何師云不是一番寒徹骨怎得梅花撲鼻香進思母難請小參師云升無畏床說無為法且道無為法作麼生說良久顧左右云還聞麼若聞者只教他倒退三千里何故寒風細雨煨爐火土面灰頭說向誰僧問世尊不說說說個甚麼師云仰之彌高僧云迦葉不聞聞聞箇甚麼師云鑽之彌堅僧云謝師答話師云須力行始得元旦示衆師云新年新歲新陽回拂面春風殿閣來萬物方蘇萌未突梅花依舊占先開僧問師受楊遇春齊將甚麼酬謝師喝云八識田中定有收進云只如終日喫飯不曾咬著一粒米是恁麼人師云自問自看光禎光祥光鑑請為亡師小參師詣靈前以竹篦打圓相云世界恁麼寬眼裏與麼闊若是衲僧家不向漆桶坐放開一線滿乾坤收來只如粟米大且道收的是放的是若向者裡薦得祗慧亡者在老僧竹篦頭上速證無生法忍了無滯礙亦任去來復以竹篦劃一劃云金錢著火孝眷應哀與大冶性闊維那大機能大用輥芥投針時打開布袋口放出師子兒茶話師云早間說禪說道橫說豎說顛倒說即今還在諸人眼裏耳裏麼若在不消重說偈言設若不在甚處去也良久喝一喝與省諦實參維那屢訪明師成大器三登九上莫辭勞吾今機下親叮囑棒喝交馳定不饒與桂芳湛月悅衆侍奉師尊左右傍朝參暮請有何妨工夫久久打成片自有美名播遠方師見僧出乃作此云會麼僧以腳抹卻師云門外漢僧云也不得壓良為賤師云有甚麼過師喚一僧僧近前師展兩手云是甚麼僧云好個世界師云你喚甚麼作世界僧無語師便打與咄省印悟書記觀汝尋常不說說知音盡在不言中真參實悟此心也確守毗尼久自通頌鴉子見人為甚麼飛去前箭猶輕後箭深网然失卻自家珍如斯只到不疑地軟舌何曾出口唇自贊與明夙念殊侍者老僧半邊鼻孔珍之遠離憎愛不枉四歲半時要吾帽子頂戴為明已舉火大限到來無本可據一息不還靈光何去山僧不吝唇吻與汝通個消息拈火炬吹一吹云還會麼四肢百骸亂飛灰烈火光中隨遊戲為壁隨起龕師拈竹篦擊亡僧龕云生生死死死死生生與你說破直證無生復擊一下舉火撒手全不顧誰更有去來大衆齊相送助汝一堆柴為祗慧入塔師至塔前云赤灑灑光爍爍衆等與汝造直裰不問衫子幾斤多千古時人覷不破既覷不破且道作麼生著師以竹篦指塔戶令入云自在常安樂為光修入塔師塔前以手捧靈骨云老僧連日病起也無薦拔法語此時寶塔門開請入其數可矣雖然如是說話要吾吩咐與你遂高聲云入康熙戊辰仲夏吉旦嘉郡楞嚴寺般若坊藏板秀水夏竹鄰書陳馥林子美璋同梓
