body:
  text: 門人寂遐等編機緣師乃蜀省富順縣人父姓高母楊氏第四子于二十五依師翁聖可和尚雉落師初參靈峰大師問如何是觀自在峰坐定云自在觀音師云在甚麼處峰云當面不識師便喝峰云臨濟四喝你者是那喝師又喝峰云我三十年參方今日始見半個禪師又同衆喫茶峰云山僧有一隻聖箭東邊要射西邊大將軍師云折卻了也峰云你甚處見得師桌上一掌峰云未在師云百拶碎傍有一僧云好隻聖箭射不著師劈面便掌師參雲峰體宗和尚師問四大幻身將甚麼作主峰卓拄杖一下師云謝和尚指示峰呵呵大笑師禮拜旬日又問頭頭是法何一法著力峰便打師云學人不用者一法峰云你道來看師便喝峰又打師禮拜三十日普茶又問三十日到來將甚麼作把柄峰云一碟黃䭔兩碗茶師云恰好下口峰云恐脹壞汝肚皮師云飽休師參昭覺丈和尚結制落堂師問盡大地是箇鐵饅頭被者漢一拳打破覺云百拶碎始得師拂袖歸衆師參華巖師翁和尚一日入方丈問有佛處不可住無佛處急走過如何是有佛處和尚便喝師禮拜尚云你是會得拜會不得拜師云傍觀者親尚云你喚甚麼作傍觀者師又拜尚云卻成兩個師拂袖便出一日疑德山公案聞住火板畢和尚才出方丈師迎住云鐘未響鼓未鳴向甚麼處去尚劈面便掌師云且喜和尚會末後句尚云不勞重拈出師翁和尚一日落堂問文殊是七佛之師因甚出女子定不得師云話頭忘卻了又問罔明初地菩薩因甚出女子定得師云猶有話頭在又問女子具甚麼手眼得近佛座師遂作女人拜尚云我與你作揖又作麼生師又作女人拜和尚便打從此機緣時時相契以偈印云言下知端的宗通說亦通不懷人我見定絶五家宗本師和尚舉世尊不說說迦葉不聞聞常示人參究師入廚問僧云你作麼生參究僧展兩手云叫我參個甚麼師云被我勘破傍有一僧豎拳云還勘得破者個麼師云腳忙手亂作麼師入堂一僧云作麼生師云數珠僧云不必數師云在我手裏僧云既在手裏數他作麼師云切莫空過師見一雞與人相鬥其人打之師入堂問僧云參禪人何不相救僧云豈不聞庵內人不知庵外事師云一等死漢僧云只今是死是活師云你自定當看僧云生死事盡在我手裏師云你將甚麼作生死僧擬議師便打解制後僧問今年有多少人坐禪師云二十餘人進云有幾人打破漆桶師云箇箇打破進云既是打破見甚麼道理師拈紙示之進云有紙拈紙無紙拈箇甚麼師云待你打破漆桶來向汝道一僧辭去師云鐵釘飯木楂羹是難吞吐故汝辭去有二僧在傍皆擬議師云果然一僧云師也承當不下師云賊過張弓梁居士問行則同行坐則同坐臥則同眠阿那個是父母未生前本來面目師云你即今在甚麼處士云在者裏師云者裏是甚麼士擬議師便打士一喝師打云你再喝一喝看士便拜師又打士云清風與明月師云不是遂徵云靈龜豫曉因甚不知其死士擬議師便開示士禮退師入堂僧問金剛經上有四眼是那四眼師云一一問將來進云如何是天眼師豎起拳進云如何是佛眼師放下拳進云如何是法眼師便喝進云如何是慧眼師云你向者一喝會得許你具一隻眼師入堂考工問一僧你讀儒書耶進云是師云吾無隱乎爾你作麼生會僧拂袖歸衆師便打問一僧父母未生前如何是本來面目僧便喝師云除了者一喝又作麼生僧擬議師便打又問一僧父母未生前如何是本來面目僧云頭頭撞著師云父母未生前那裏是你開口處僧擬議師便打入室僧入師云你每日經樓上看經將那一句了你生死僧彈指一下師云者箇是過去諸佛的那個是你的僧云一刀兩斷師云將甚麼作刀僧豎起拳師云猶做手腳在僧入師云生從何來死從何去僧云無來無去師云我早上考工你在甚麼處僧默然師云你無言我無語僧入師云你一向住山你將住山道一句來僧便喝師云嚇殺老僧僧入師云不思善不思惡那個是省上座本來面目僧便喝師云一喝如金剛王寶劍一喝如踞地獅子一喝如探竿影草一喝不作一喝用你是那一喝僧默然師云參去僧入師云我前日問汝西宗汝不會今日道看僧云本來面目師云你將甚麼作本來面目僧云一嘴黑鬍子師云燒了時如何僧無語僧入師云未開口時我便棒是賞是罰僧云是賞師云老僧未拈棒時作麼生僧豎起拳師云燒了時又作麼生僧以腳畫地作圓相師云腳忙手亂僧入師以拄杖卓一卓云會麼僧云不會師打云會麼僧云不會師又打僧入師云今早打汝三棒你道是賞是罰僧云是賞師云賞在甚處僧云在和尚師又打云再喫一頓僧入師云萬法歸一一歸何處僧云遊山玩水師云虛費草鞋錢僧入師云你在老和尚處為侍者和尚向你說甚麼僧云無法可說師云你即今說的聻僧擬議師云莫道無法好僧入師云你遊遍諸方真實道一句看僧云無實處師云空過一生僧拂袖便行師云果然空過僧入師云三界惟心萬法惟識因甚今日不知明日事僧云不向和尚道師云不妨道看僧云若向和尚道矢上加尖師云果然一沙彌入師云如何是孝順之子沙彌無語師代云吾常于此切僧入師拈布毛吹一吹云會麼僧無語師云老僧吹布毛是微處如何是你映微僧又無語師云參去僧入師云有句無句如藤倚樹樹倒藤枯句歸何處僧云收放在此師云甚麼所在說收說放僧禮退僧入師云念佛的是誰僧云打三入室師云打三入室與你甚麼相干僧便喝師云你者一喝是念佛底是不念佛底僧云不會師云參去一僧入方丈作禮云做工夫不上路請和尚開示師召云近前來僧便近前師云你參的是甚麼話頭僧云父母未生前師云你問我向你道僧便退身問云父母未生前如何是本來面目師招手云近前來僧又近前師云誰敢駭汝僧云不會師云誰道汝不上路師問居士你者一月在甚麼處住士云城中師云是甚麼境界士豎起拳師云把火來燒卻士又豎起拳云還燒得者箇麼師云送者亡士出去一僧號自圓師呼近前僧便作禮師以竹篦向地打圓相云會麼僧云不會師云何不道自圓一僧辭去師云開春本堂和尚歸院你還來否僧云來師云你有常住所繫放不下僧云大限臨頭有甚所繫師云既然如是且住莫去僧云暫時未了師云果然放不下拈古昔有一老宿一夏不為師僧說話有一僧云一夏來只恁空過不敢望和尚說佛法得聞正因兩字也得老宿聞云闍黎莫誓速若論正因一字也無道了叩齒云適來無端不合與麼道鄰房有老宿聞云好一釜羹被一顆鼠糞污卻雪竇云誰家釜裏沒一兩顆拈云二老宿瞞天說價就地還錢者僧雖爾憨癡也解捋虎鬚何也不入虎穴焉得虎子神仙僧密禪師與洞山同行次見白兔走過仙云俊哉洞曰作麼生仙曰大似白衣拜相洞曰老老大大作與麼說話仙曰你又作麼生洞曰積代簪纓暫時落魄拈云神仙亦非缺少大似拋磚引玉洞山也不較多與人拔楔抽釘雖然如是殊不知遭人檢點檢點個甚麼貪觀天上月失卻手中橈舉古舉須菩提說法帝釋雨花尊者問云此花從天得耶帝釋云弗也從地得耶帝釋云弗也從人得耶帝釋云弗也從何得耶帝釋舉手尊者云如是如是師云尊者是肯他雨花耶是肯他舉手耶諸人點檢得出許你諸人具眼其或未然猶隔津在頌古睹星悟道六年冷坐雪山中寒艷氛氛逐滿空忽睹明星開正眼無端妙用一腔紅女子出定兩兩三三父父子子看來好事不如無耳愚而能智智而能愚一條拄杖兩人舁昔有一老宿不為師僧說話因緣尊宿也不說者僧也不疑任麼傍不肯俱是丈夫兒黃龍三關生緣佛手與驢腳把住玄關別一天若契其機掉背去不如脅下便還拳靈雲見桃花悟道觸目明明是眼華其中不肯有玄沙眼無筋也舌無骨總到而今不作家婆子燒菴正恁麼時生鐵鑄何妨逆境共相依老婆非是顯乖俏把火燒菴圖地肥萬法歸一一歸何處大人機變猶如急箭直透九重不掛一線僧問石門年窮歲盡時如何門云東村王老夜燒錢問甚分明答甚奇何嘗節外更生枝一生伎倆渾然盡到處逢人痛著錐僧問洞山如何是衲僧孔竅山云十八女子不繫裙明明一句通方語堪與時人共舉揚隨類現形俱漏泄呼奴作主太郎當僧問溈山如何是百丈真山下禪床叉手而立又問如何是和尚真山便坐二真不假丹青畫起倒分明說似伊的是從源親見得神頭鬼面露家私神仙僧密禪師與洞山同行次見白兔走過因緣玉兔能狡猾突出令人看猶被他換卻刺腦入膠盆疏山手中握木蛇僧問和尚手中是甚麼山提起云曹家女平常捏怪沒遮攔見者聞者毛骨寒佛口蛇心咸莫測活人抬在死人棺青原令石頭持書與南嶽讓和尚問不慕諸聖因緣去去來來為甚忙草鞋足下路頭長雖然不動纖毫也依舊遭他一斧傷又險處險兮平處平莫將知解妄疏親從來不借他人力無輻高車任縱橫紫玉山道通禪師因于頔問如何是黑風吹其船舫漂墮羅剎鬼國通云客作漢問與麼事作什麼于失色通云即此便是黑風吹其船舫漂墮羅剎鬼國于便作禮瞞天說價就地還錢等閒一喚萬法周圓兩眼瞪開誰少缺惡因緣是好因緣布袋和尚布袋布袋是何三昧惑亂于人有甚自在不如放下空手行一任優游無罣礙黃龍誨機問巖頭如何是祖師西來意頭云你解救餈麼機云解頭云救餈去機又問玄泉泉拈起皂角云會麼機云不會泉放下皂角作洗勢機便作禮云原來佛法無別泉云你見甚麼道理機云某甲問巖頭頭云你解救餈麼豈不是解黏今日和尚拈皂角亦是解黏所以道無別泉呵呵大笑機乃有省救餈皂角攪肚腸呵呵含笑絶商量東家中毒西家發始信婆婆是小娘僧問趙州如何是佛州云庭前柏樹子果甚希奇老趙州隨機應變最難酬通身手眼通身用馬子驢兒喚作牛我在葉縣備曾試之十首莫將此事當尋常惡罵捶打忍耐強幾番曲折成良器始得春光化日長千磨百折最為良不是浮山誰敢當如水投水盈一器方堪法社作金湯縱有許多不稱意翻然改換是良方大乘根器非容易葉縣浮山一脈長巧梓方能裁曲直何嘗枉費一莖材只因繩墨有差舛縱是靈樁也受災不憚春秋並暑寒秖圖打破者泥團一毫頭上翻斤斗天自高兮地自寬死生二字日隄防叩彼明師益我長何必安排再巧妙實心達本自承當才乍相逢怒氣昂任憑惡水反安庠撼搖不動一株樹堪與行人作蔭涼婆心不厭加鞭策直指男兒入衆流上古焉能如此切千軍易得將難求專心慕道謾徘徊大山火輪赴善財樓閣門開見彌勒一聲含笑嘆奇哉曹洞宗風賴阿誰遠公隻手可能為故教異苗翻茂盛密固靈根總不遺白雲問公輔牛淳乎照用同時以叱之牛淳不懼逆風吹輕蹄踏破煙花後直入衆群也大奇退思日用與理矛盾者極多工夫如似剝芭蕉芭蕉剝盡理自消到此不須求玄妙頭頭法法具該超扣彼所長礪我所短立行丈夫志為法渾忘卑扣彼所長處輔我不足而今古之模範天人之道師古人一日不作一日不食之戒前輩力行後作標不惟日長道根苗時人若效前賢志千兩黃金也易消豫備則無患樞機于未發時刻謹隄防一朝伎倆盡漆桶忽放光城東老母不欲見佛與佛同生不認真隱跡藏蹤太不仁如斯苦解就陰止倒轉鎗旗劈面陳摩訶祖師苦骨勞形怎放過摩訶二字口中歌歌來歌去無歌也煮石烹砂滋味多金剛圈尋常道箇金剛圈方則方兮圓則圓要與揚岐同出氣還當鼻孔自遼天栗棘蓬栗蓬無味使君參擬議思量便不安臨濟兒孫非捏怪尋常茶飯幾人餐無位真人兩眼瞪開無少缺朝朝起倒共相隨聞聲見色誰能會只許佳人獨自知臨